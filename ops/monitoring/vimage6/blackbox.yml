modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 204]
      method: GET
      follow_redirects: true
      preferred_ip_protocol: ip4

  http_2xx_or_3xx:
    prober: http
    timeout: 5s
    http:
      valid_status_codes: [200, 204, 301, 302, 307, 308]
      method: GET
      follow_redirects: true
