modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      valid_http_versions: ["HTTP/1.0", "HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 204]
      method: GET
      follow_redirects: true
      preferred_ip_protocol: ip4

  http_2xx_or_3xx:
    prober: http
    timeout: 5s
    http:
      valid_status_codes: [200, 204, 301, 302, 307, 308]
      method: GET
      follow_redirects: true
      preferred_ip_protocol: ip4

  http_2xx_ssl:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 204]
      method: GET
      follow_redirects: true
      preferred_ip_protocol: ip4
      tls_config:
        insecure_skip_verify: false

  # Orchestrator /health requires internal auth — 401 means the process is up.
  http_2xx_or_401:
    prober: http
    timeout: 5s
    http:
      valid_status_codes: [200, 204, 401]
      method: GET
      follow_redirects: true
      preferred_ip_protocol: ip4

  tcp_connect:
    prober: tcp
    timeout: 5s
    tcp:
      preferred_ip_protocol: ip4
