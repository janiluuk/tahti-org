# Phase 5 deploy pipeline
#
# CI success on main  → deploy staging with dated release tag (YYYY-MM-DD-buildnr images from CI)
# git tag v*.*.*       → build images → deploy production (requires manual approval)
# CI release job builds/pushes images — see .github/workflows/ci.yml
#
# Required secrets (repository):
#   REGISTRY_PASSWORD   — registry.tahti.live (user defaults to tahti; override via REGISTRY_USER)
#   REGISTRY_USER       — optional
#   DEPLOY_SSH_PRIVATE_KEY             — ed25519 key authorized on staging + prod nodes
#
# Required variables (repository or environment):
#   STAGING_HOST  — manager node IP for staging cluster
#   PROD_HOST     — manager node IP for production cluster
#   DEPLOY_PATH   — e.g. /srv/tahti (same on both clusters)

name: deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: registry.tahti.live
  NODE_VERSION: "24"
  PNPM_VERSION: "9"

jobs:
  resolve:
    name: Resolve deploy target
    if: >
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push') ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    outputs:
      deploy_sha: ${{ steps.out.outputs.deploy_sha }}
      image_tag: ${{ steps.out.outputs.image_tag }}
      skip_build: ${{ steps.out.outputs.skip_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - id: out
        run: |
          case "${{ github.event_name }}" in
            workflow_run)
              SHA="${{ github.event.workflow_run.head_sha }}"
              git fetch --tags origin
              TAG="$(git tag --points-at "$SHA" | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]+$' | sort -V | tail -1 || true)"
              if [[ -z "$TAG" ]]; then
                echo "::error::No dated release tag on ${SHA} — CI release job may have failed"
                exit 1
              fi
              echo "deploy_sha=${SHA}" >> "$GITHUB_OUTPUT"
              echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
              echo "skip_build=true" >> "$GITHUB_OUTPUT"
              echo "Deploying release ${TAG} (${SHA})"
              ;;
            push)
              echo "deploy_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
              echo "image_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
              echo "skip_build=false" >> "$GITHUB_OUTPUT"
              ;;
            workflow_dispatch)
              echo "deploy_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
              echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
              echo "skip_build=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

  preflight:
    name: Check deploy secrets
    runs-on: ubuntu-24.04
    outputs:
      registry: ${{ steps.check.outputs.registry }}
      staging: ${{ steps.check.outputs.staging }}
    steps:
      - id: check
        env:
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          STAGING_HOST: ${{ vars.STAGING_HOST }}
        run: |
          if [[ -n "${REGISTRY_PASSWORD}" ]]; then
            echo "registry=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::REGISTRY_PASSWORD not set — skipping registry build/push"
            echo "registry=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ -n "${DEPLOY_KEY}" && -n "${STAGING_HOST}" ]]; then
            echo "staging=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Deploy staging skipped (need DEPLOY_SSH_PRIVATE_KEY and STAGING_HOST)"
            echo "staging=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Build all images ─────────────────────────────────────────────────────────
  build:
    name: Build & push images
    needs: [preflight, resolve]
    if: >-
      needs.preflight.outputs.registry == 'true' &&
      needs.resolve.outputs.skip_build != 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Login to registry
        env:
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          REGISTRY_USER: ${{ secrets.REGISTRY_USER || 'tahti' }}
        run: |
          echo "$REGISTRY_PASSWORD" | \
            docker login ${{ env.REGISTRY }} -u "$REGISTRY_USER" --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push website
        uses: docker/build-push-action@v5
        with:
          context: .
          file: website/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/tahti/website:${{ needs.resolve.outputs.image_tag }}
            ${{ env.REGISTRY }}/tahti/website:${{ needs.resolve.outputs.deploy_sha }}
            ${{ env.REGISTRY }}/tahti/website:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/tahti/website:latest
          cache-to: type=inline

      - name: Build and push api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/tahti/api:${{ needs.resolve.outputs.image_tag }}
            ${{ env.REGISTRY }}/tahti/api:${{ needs.resolve.outputs.deploy_sha }}
            ${{ env.REGISTRY }}/tahti/api:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/tahti/api:latest
          cache-to: type=inline

      - name: Build and push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          # NEXT_PUBLIC_* vars are inlined at build time — bake the production
          # cross-origin URLs in here (docker-stack.yml's `environment:` for
          # these is inert at runtime and only documents the intended values).
          build-args: |
            NEXT_PUBLIC_API_BASE=https://api.tahti.live
            NEXT_PUBLIC_API_URL=https://api.tahti.live
            NEXT_PUBLIC_CENTRIFUGO_WS=wss://chat.tahti.live/connection/websocket
            NEXT_PUBLIC_APP_URL=https://app.tahti.live
          tags: |
            ${{ env.REGISTRY }}/tahti/web:${{ needs.resolve.outputs.image_tag }}
            ${{ env.REGISTRY }}/tahti/web:${{ needs.resolve.outputs.deploy_sha }}
            ${{ env.REGISTRY }}/tahti/web:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/tahti/web:latest
          cache-to: type=inline

      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/tahti/worker:${{ needs.resolve.outputs.image_tag }}
            ${{ env.REGISTRY }}/tahti/worker:${{ needs.resolve.outputs.deploy_sha }}
            ${{ env.REGISTRY }}/tahti/worker:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/tahti/worker:latest
          cache-to: type=inline

      - name: Build and push orchestrator
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/orchestrator/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/tahti/orchestrator:${{ needs.resolve.outputs.image_tag }}
            ${{ env.REGISTRY }}/tahti/orchestrator:${{ needs.resolve.outputs.deploy_sha }}
            ${{ env.REGISTRY }}/tahti/orchestrator:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/tahti/orchestrator:latest
          cache-to: type=inline

  # ── Deploy staging ───────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy staging
    needs: [preflight, resolve, build]
    if: >-
      needs.preflight.outputs.staging == 'true' &&
      (needs.resolve.outputs.skip_build == 'true' || needs.build.result == 'success')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<CFG
          Host staging
            HostName ${{ vars.STAGING_HOST }}
            User root
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            BatchMode yes
            StrictHostKeyChecking accept-new
          CFG

      - name: Push stack files to staging
        run: |
          rsync -az --mkpath \
            infra/docker-stack.yml \
            infra/docker-stack.staging.yml \
            infra/Caddyfile.staging \
            infra/centrifugo.json \
            infra/nginx-rtmp.conf \
            infra/icecast.xml \
            infra/icecast-b.xml \
            infra/prometheus.yml \
            staging:${{ vars.DEPLOY_PATH || '/srv/tahti' }}/infra/

      - name: Apply database migrations
        run: |
          ssh staging "
            cd ${{ vars.DEPLOY_PATH || '/srv/tahti' }}
            set -a
            [ -f stack.env ] && . stack.env
            set +a
            TAG=${{ needs.resolve.outputs.image_tag }} REGISTRY=registry.tahti.live ./scripts/db-migrate-deploy.sh --image
          "

      - name: Deploy Swarm stack
        run: |
          ssh staging "
            cd ${{ vars.DEPLOY_PATH || '/srv/tahti' }}
            set -a
            [ -f stack.env ] && . stack.env
            set +a
            TAG=${{ needs.resolve.outputs.image_tag }} docker stack deploy \
              --with-registry-auth \
              --prune \
              -c infra/docker-stack.yml \
              -c infra/docker-stack.staging.yml \
              tahti-staging
          "

      - name: Wait for healthy services
        run: |
          sleep 30
          ssh staging "docker stack services tahti-staging --format '{{.Name}} {{.Replicas}}'"

      - name: Smoke test staging
        run: |
          staging_host="${{ vars.STAGING_HOST }}"
          curl -fsS --retry 5 --retry-delay 5 \
            "http://${staging_host}:2080/smoke"
          curl -fsS --retry 5 --retry-delay 5 \
            "https://api.staging.tahti.live/health" || echo "TLS not yet ready — skipping"

  # ── Deploy production (tagged releases only, requires approval) ──────────────
  deploy-production:
    name: Deploy production
    needs: [deploy-staging, resolve]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<CFG
          Host prod
            HostName ${{ vars.PROD_HOST }}
            User root
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            BatchMode yes
            StrictHostKeyChecking accept-new
          CFG

      - name: Push stack files to production
        run: |
          rsync -az --mkpath \
            infra/docker-stack.yml \
            infra/Caddyfile \
            infra/centrifugo.json \
            infra/nginx-rtmp.conf \
            infra/icecast.xml \
            infra/icecast-b.xml \
            infra/prometheus.yml \
            prod:${{ vars.DEPLOY_PATH || '/srv/tahti' }}/infra/

      - name: Apply database migrations
        run: |
          ssh prod "
            cd ${{ vars.DEPLOY_PATH || '/srv/tahti' }}
            set -a
            [ -f stack.env ] && . stack.env
            set +a
            TAG=${{ needs.resolve.outputs.image_tag }} REGISTRY=registry.tahti.live ./scripts/db-migrate-deploy.sh --image
          "

      - name: Deploy Swarm stack
        run: |
          ssh prod "
            cd ${{ vars.DEPLOY_PATH || '/srv/tahti' }}
            set -a
            [ -f stack.env ] && . stack.env
            set +a
            TAG=${{ needs.resolve.outputs.image_tag }} docker stack deploy \
              --with-registry-auth \
              --prune \
              -c infra/docker-stack.yml \
              tahti
          "

      - name: Wait for healthy services
        run: |
          sleep 45
          ssh prod "docker stack services tahti --format '{{.Name}} {{.Replicas}}'"

      - name: Smoke test production
        run: |
          curl -fsS --retry 5 --retry-delay 10 https://tahti.live/health
          curl -fsS --retry 5 --retry-delay 10 https://api.tahti.live/health

      - name: Rollback on failure
        if: failure()
        run: |
          ssh prod "
            for svc in website api web worker-media worker-light chat orchestrator; do
              docker service rollback tahti_\$svc || true
            done
          "
