# API e2e — vital flows against a live Fastify instance + Postgres.
# Complements Vitest integration tests (apps/api) with curl-based smoke checks.

name: E2E — API vital flows

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

concurrency:
  group: e2e-api-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  vital-flows:
    name: Vital API flows (curl)
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tahti
          POSTGRES_PASSWORD: tahti_test
          POSTGRES_DB: tahti_test
        options: >-
          --health-cmd "pg_isready -U tahti -d tahti_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 3
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgres://tahti:tahti_test@localhost:5432/tahti_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      HCAPTCHA_SECRET: dev
      PORT: "3001"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @tahti/db db:generate

      - name: Push DB schema
        run: pnpm --filter @tahti/db db:migrate:test

      - name: Start API server
        working-directory: apps/api
        run: |
          pnpm exec tsx src/index.ts &
          echo $! > /tmp/tahti-api.pid

      - name: Wait for API health
        run: |
          for i in $(seq 1 45); do
            if curl -sf http://localhost:3001/health; then
              exit 0
            fi
            sleep 1
          done
          echo "::error::API did not become healthy"
          exit 1

      - name: Run vital flows e2e
        run: bash tests/e2e/vital-flows.sh

      - name: Stop API server
        if: always()
        run: |
          if [[ -f /tmp/tahti-api.pid ]]; then
            kill "$(cat /tmp/tahti-api.pid)" 2>/dev/null || true
          fi
