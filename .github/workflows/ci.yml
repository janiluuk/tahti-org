# CI — website Docker build (always) + monorepo lint/test/agpl-check (when pnpm-lock.yaml exists)
#
# Monorepo jobs (lint-typecheck, test, agpl-check) activate automatically once
# pnpm-lock.yaml is committed (Phase 4 M0 scaffold). Until then only the website
# image build runs.
#
# e2e-phase4 is a separate workflow (e2e-phase4.yml) — it runs against a live
# deployment and must be triggered manually or via deploy hooks.

name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  # Run on every pull request regardless of base branch. The project uses a
  # stacked-PR ("merge train") workflow where PRs target intermediate feature
  # branches, not just main — restricting to `branches: [main]` meant those
  # stacked PRs never triggered CI.
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  website-docker:
    name: Validate website Docker build
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Build website image
        run: docker build -t tahti/website:ci ./website

  lint-typecheck:
    name: Lint & typecheck
    if: hashFiles('pnpm-lock.yaml') != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @tahti/db db:generate

      - name: Lint (ESLint)
        run: pnpm lint

      - name: Typecheck (tsc --noEmit)
        run: pnpm typecheck

      - name: Check formatting (Prettier)
        run: pnpm format:check

  test:
    name: Unit + integration tests
    if: hashFiles('pnpm-lock.yaml') != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tahti
          POSTGRES_PASSWORD: tahti_test
          POSTGRES_DB: tahti_test
        options: >-
          --health-cmd "pg_isready -U tahti -d tahti_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 3
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgres://tahti:tahti_test@localhost:5432/tahti_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @tahti/db db:generate

      - name: Push DB schema (test database)
        run: pnpm --filter @tahti/db db:migrate:test

      - name: Run tests
        run: pnpm test --reporter=verbose

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: "**/coverage/"
          retention-days: 7

  agpl-check:
    name: AGPL header check
    if: hashFiles('pnpm-lock.yaml') != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Check AGPL-3.0 header in all source files
        run: |
          MISSING=0
          while IFS= read -r -d '' file; do
            if ! head -3 "$file" | grep -q "AGPL"; then
              echo "Missing AGPL header: $file"
              MISSING=$((MISSING + 1))
            fi
          done < <(find apps packages services \( -name "*.ts" -o -name "*.tsx" \) \
            -not -path "*/node_modules/*" \
            -not -path "*/dist/*" \
            -not -path "*/.next/*" \
            -not -name "*.d.ts" \
            -print0 2>/dev/null)

          if [[ $MISSING -gt 0 ]]; then
            echo ""
            echo "::error::$MISSING file(s) missing AGPL-3.0 header"
            exit 1
          fi
          echo "✓ All source files have AGPL-3.0 headers"

  all-checks:
    name: All checks
    if: always()
    needs: [website-docker, lint-typecheck, test, agpl-check]
    runs-on: ubuntu-24.04
    steps:
      - name: Check all jobs passed
        run: |
          ok() { [[ "$1" == "success" || "$1" == "skipped" ]]; }
          ok "${{ needs.website-docker.result }}" || { echo "website-docker failed"; exit 1; }
          ok "${{ needs.lint-typecheck.result }}" || { echo "lint-typecheck failed"; exit 1; }
          ok "${{ needs.test.result }}" || { echo "test failed"; exit 1; }
          ok "${{ needs.agpl-check.result }}" || { echo "agpl-check failed"; exit 1; }
          echo "All checks passed ✓"
