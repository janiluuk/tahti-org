# CI — lint, typecheck, tests, API vital-flows e2e, website Docker, AGPL headers.
# On push to main (after all checks): creates GitHub release tag YYmmdd-buildnr (UTC).
# Screenshots are local-only: ./scripts/e2e-screenshots.sh (not run here).

name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  website-docker:
    name: Validate website Docker build
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Build website image
        run: docker build -t tahti/website:ci ./website

  lint:
    name: Lint & format
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @tahti/db db:generate

      - name: ESLint (turbo lint)
        run: pnpm lint

      - name: Prettier (format:check)
        run: pnpm format:check

  typecheck:
    name: Typecheck
    needs: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @tahti/db db:generate

      - name: Typecheck (tsc --noEmit)
        run: pnpm typecheck

  test:
    name: Unit + integration tests
    needs: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tahti
          POSTGRES_PASSWORD: tahti_test
          POSTGRES_DB: tahti_test
        options: >-
          --health-cmd "pg_isready -U tahti -d tahti_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 3
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgres://tahti:tahti_test@localhost:5432/tahti_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @tahti/db db:generate

      - name: Push DB schema (test database)
        run: pnpm --filter @tahti/db db:migrate:test

      - name: Run tests
        run: pnpm test --reporter=verbose

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: "**/coverage/"
          retention-days: 7

  vital-flows-e2e:
    name: API vital flows (curl e2e)
    needs: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tahti
          POSTGRES_PASSWORD: tahti_test
          POSTGRES_DB: tahti_test
        options: >-
          --health-cmd "pg_isready -U tahti -d tahti_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 3
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgres://tahti:tahti_test@localhost:5432/tahti_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      HCAPTCHA_SECRET: dev
      PORT: "3001"
      STRIPE_SECRET_KEY: ""
      STRIPE_WEBHOOK_SECRET: ""

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @tahti/db db:generate

      - name: Push DB schema
        run: pnpm --filter @tahti/db db:migrate:test

      - name: Start API server
        working-directory: apps/api
        run: |
          pnpm exec tsx src/index.ts &
          echo $! > /tmp/tahti-api.pid

      - name: Wait for API health
        run: |
          for i in $(seq 1 45); do
            if curl -sf http://localhost:3001/health; then
              exit 0
            fi
            sleep 1
          done
          echo "::error::API did not become healthy"
          exit 1

      - name: Run vital flows e2e
        run: bash tests/e2e/vital-flows.sh

      - name: Stop API server
        if: always()
        run: |
          if [[ -f /tmp/tahti-api.pid ]]; then
            kill "$(cat /tmp/tahti-api.pid)" 2>/dev/null || true
          fi

  user-journeys-e2e:
    name: User journey e2e (viewer, artist, streamer)
    needs: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tahti
          POSTGRES_PASSWORD: tahti_test
          POSTGRES_DB: tahti_test
        options: >-
          --health-cmd "pg_isready -U tahti -d tahti_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 3
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgres://tahti:tahti_test@localhost:5432/tahti_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      HCAPTCHA_SECRET: dev
      PORT: "3001"
      STRIPE_SECRET_KEY: ""
      STRIPE_WEBHOOK_SECRET: ""
      SEED_JOURNEY_FIXTURES: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @tahti/db db:generate

      - name: Push DB schema
        run: pnpm --filter @tahti/db db:migrate:test

      - name: Seed journey fixtures
        run: cd apps/api && pnpm exec tsx scripts/seed-e2e-screenshots.ts

      - name: Start API server
        working-directory: apps/api
        run: |
          pnpm exec tsx src/index.ts &
          echo $! > /tmp/tahti-api-journey.pid

      - name: Wait for API health
        run: |
          for i in $(seq 1 45); do
            if curl -sf http://localhost:3001/health; then
              exit 0
            fi
            sleep 1
          done
          echo "::error::API did not become healthy"
          exit 1

      - name: Run user journey e2e (API + optional web)
        run: bash tests/e2e/user-journeys.sh

      - name: Stop API server
        if: always()
        run: |
          if [[ -f /tmp/tahti-api-journey.pid ]]; then
            kill "$(cat /tmp/tahti-api-journey.pid)" 2>/dev/null || true
          fi

  agpl-check:
    name: AGPL header check
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Check AGPL-3.0 header in all source files
        run: |
          MISSING=0
          while IFS= read -r -d '' file; do
            if ! head -3 "$file" | grep -q "AGPL"; then
              echo "Missing AGPL header: $file"
              MISSING=$((MISSING + 1))
            fi
          done < <(find apps packages services \( -name "*.ts" -o -name "*.tsx" \) \
            -not -path "*/node_modules/*" \
            -not -path "*/dist/*" \
            -not -path "*/.next/*" \
            -not -name "*.d.ts" \
            -print0 2>/dev/null)

          if [[ $MISSING -gt 0 ]]; then
            echo ""
            echo "::error::$MISSING file(s) missing AGPL-3.0 header"
            exit 1
          fi
          echo "✓ All source files have AGPL-3.0 headers"

  generate-openapi:
    name: Generate OpenAPI spec
    # Only run on pushes to main (not on PRs) — produces the versioned spec artifact
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, typecheck]
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tahti
          POSTGRES_PASSWORD: tahti_dev
          POSTGRES_DB: tahti_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://tahti:tahti_dev@localhost:5432/tahti_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      PORT: 3001

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Push DB schema
        run: pnpm --filter @tahti/db exec prisma db push --skip-generate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Export OpenAPI spec (JSON)
        run: pnpm --filter @tahti/api exec tsx scripts/export-openapi.ts
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Upload OpenAPI spec artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-${{ github.sha }}
          path: openapi.json
          retention-days: 90

  all-checks:
    name: All checks
    if: always()
    needs:
      - website-docker
      - lint
      - typecheck
      - test
      - vital-flows-e2e
      - user-journeys-e2e
      - agpl-check
    runs-on: ubuntu-24.04
    steps:
      - name: Check all jobs passed
        run: |
          ok() { [[ "$1" == "success" || "$1" == "skipped" ]]; }
          ok "${{ needs.website-docker.result }}" || { echo "website-docker failed"; exit 1; }
          ok "${{ needs.lint.result }}" || { echo "lint failed"; exit 1; }
          ok "${{ needs.typecheck.result }}" || { echo "typecheck failed"; exit 1; }
          ok "${{ needs.test.result }}" || { echo "test failed"; exit 1; }
          ok "${{ needs.vital-flows-e2e.result }}" || { echo "vital-flows-e2e failed"; exit 1; }
          ok "${{ needs.user-journeys-e2e.result }}" || { echo "user-journeys-e2e failed"; exit 1; }
          ok "${{ needs.agpl-check.result }}" || { echo "agpl-check failed"; exit 1; }
          echo "All checks passed ✓"

  release:
    name: Release (YYmmdd-buildnr)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [all-checks]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    concurrency:
      group: release-main
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next release tag
        id: tag
        run: |
          chmod +x scripts/next-release-tag.sh
          TAG="$(scripts/next-release-tag.sh)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

      - name: Download OpenAPI spec
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: openapi-${{ github.sha }}
          path: release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            release-assets/openapi.json
          fail_on_unmatched_files: false
