# CI — lint, typecheck, tests, API vital-flows e2e, website Docker, AGPL headers.
# On push to main (after all checks): creates GitHub release tag YYYY-MM-DD-buildnr (UTC).
# Release job builds/pushes Docker images to registry.tahti.live with the same tag.
# Staging deploy runs after CI via workflow_run — see .github/workflows/deploy.yml
# Screenshots are local-only: ./scripts/e2e-screenshots.sh (not run here).

name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:
  website-docker:
    name: Validate website Docker build
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Build website image
        run: docker build -t tahti/website:ci ./website

  lint:
    name: Lint & format
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @tahti/db db:generate

      - name: ESLint (turbo lint)
        run: pnpm lint

      - name: Prettier (format:check)
        run: pnpm format:check

  typecheck:
    name: Typecheck
    needs: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @tahti/db db:generate

      - name: Typecheck (tsc --noEmit)
        run: pnpm typecheck

  test:
    name: Unit + integration tests
    needs: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tahti
          POSTGRES_PASSWORD: tahti_test
          POSTGRES_DB: tahti_test
        options: >-
          --health-cmd "pg_isready -U tahti -d tahti_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 3
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgres://tahti:tahti_test@localhost:5432/tahti_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @tahti/db db:generate

      - name: Push DB schema (test database)
        run: pnpm --filter @tahti/db db:migrate:test

      - name: Baseline Prisma migrations on test DB (OPS-002)
        run: |
          if find packages/db/prisma/migrations -mindepth 1 -maxdepth 1 -type d -print -quit | grep -q .; then
            for m in packages/db/prisma/migrations/*/; do
              name=$(basename "$m")
              pnpm --filter @tahti/db exec prisma migrate resolve --applied "$name" || true
            done
            pnpm --filter @tahti/db exec prisma migrate status
          else
            echo "No prisma/migrations yet — test DB uses db push only"
          fi

      - name: Run tests
        run: pnpm test --reporter=verbose

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: "**/coverage/"
          retention-days: 7

  vital-flows-e2e:
    name: API vital flows (curl e2e)
    needs: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tahti
          POSTGRES_PASSWORD: tahti_test
          POSTGRES_DB: tahti_test
        options: >-
          --health-cmd "pg_isready -U tahti -d tahti_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 3
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgres://tahti:tahti_test@localhost:5432/tahti_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      HCAPTCHA_SECRET: dev
      PORT: "3001"
      API_URL: http://localhost:3001
      STRIPE_SECRET_KEY: ""
      STRIPE_WEBHOOK_SECRET: ""

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @tahti/db db:generate

      - name: Push DB schema
        run: pnpm --filter @tahti/db db:migrate:test

      - name: Start API server
        working-directory: apps/api
        run: |
          pnpm exec tsx src/index.ts &
          echo $! > /tmp/tahti-api.pid

      - name: Wait for API health
        run: |
          for i in $(seq 1 45); do
            if curl -sf http://localhost:3001/health; then
              exit 0
            fi
            sleep 1
          done
          echo "::error::API did not become healthy"
          exit 1

      - name: Run vital flows e2e
        run: bash tests/e2e/vital-flows.sh

      - name: Stop API server
        if: always()
        run: |
          if [[ -f /tmp/tahti-api.pid ]]; then
            kill "$(cat /tmp/tahti-api.pid)" 2>/dev/null || true
          fi

  user-journeys-e2e:
    name: User journey e2e (all personas)
    needs: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tahti
          POSTGRES_PASSWORD: tahti_test
          POSTGRES_DB: tahti_test
        options: >-
          --health-cmd "pg_isready -U tahti -d tahti_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 3
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgres://tahti:tahti_test@localhost:5432/tahti_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      HCAPTCHA_SECRET: dev
      PORT: "3001"
      API_URL: http://localhost:3001
      STRIPE_SECRET_KEY: ""
      STRIPE_WEBHOOK_SECRET: ""
      SEED_JOURNEY_FIXTURES: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @tahti/db db:generate

      - name: Push DB schema
        run: pnpm --filter @tahti/db db:migrate:test

      - name: Seed journey fixtures
        run: cd apps/api && pnpm exec tsx scripts/seed-e2e-screenshots.ts

      - name: Start API server
        working-directory: apps/api
        run: |
          pnpm exec tsx src/index.ts &
          echo $! > /tmp/tahti-api-journey.pid

      - name: Wait for API health
        run: |
          for i in $(seq 1 45); do
            if curl -sf http://localhost:3001/health; then
              exit 0
            fi
            sleep 1
          done
          echo "::error::API did not become healthy"
          exit 1

      - name: Run user journey e2e (API + optional web)
        run: bash tests/e2e/user-journeys.sh

      - name: Stop API server
        if: always()
        run: |
          if [[ -f /tmp/tahti-api-journey.pid ]]; then
            kill "$(cat /tmp/tahti-api-journey.pid)" 2>/dev/null || true
          fi

  agpl-check:
    name: AGPL header check
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Check AGPL-3.0 header in all source files
        run: |
          MISSING=0
          while IFS= read -r -d '' file; do
            if ! head -3 "$file" | grep -q "AGPL"; then
              echo "Missing AGPL header: $file"
              MISSING=$((MISSING + 1))
            fi
          done < <(find apps packages services \( -name "*.ts" -o -name "*.tsx" \) \
            -not -path "*/node_modules/*" \
            -not -path "*/dist/*" \
            -not -path "*/.next/*" \
            -not -name "*.d.ts" \
            -print0 2>/dev/null)

          if [[ $MISSING -gt 0 ]]; then
            echo ""
            echo "::error::$MISSING file(s) missing AGPL-3.0 header"
            exit 1
          fi
          echo "✓ All source files have AGPL-3.0 headers"

  generate-openapi:
    name: Generate OpenAPI spec
    # Only run on pushes to main (not on PRs) — produces the versioned spec artifact
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, typecheck]
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tahti
          POSTGRES_PASSWORD: tahti_dev
          POSTGRES_DB: tahti_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://tahti:tahti_dev@localhost:5432/tahti_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      PORT: 3001

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Push DB schema
        run: pnpm --filter @tahti/db exec prisma db push --skip-generate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Generate Prisma client
        run: pnpm --filter @tahti/db exec prisma generate

      - name: Export OpenAPI spec (JSON)
        run: pnpm --filter @tahti/api exec tsx scripts/export-openapi.ts
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Upload OpenAPI spec artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-${{ github.sha }}
          path: openapi.json
          retention-days: 90

  all-checks:
    name: All checks
    if: always()
    needs:
      - website-docker
      - lint
      - typecheck
      - test
      - vital-flows-e2e
      - user-journeys-e2e
      - agpl-check
    runs-on: ubuntu-24.04
    steps:
      - name: Check all jobs passed
        run: |
          ok() { [[ "$1" == "success" || "$1" == "skipped" ]]; }
          ok "${{ needs.website-docker.result }}" || { echo "website-docker failed"; exit 1; }
          ok "${{ needs.lint.result }}" || { echo "lint failed"; exit 1; }
          ok "${{ needs.typecheck.result }}" || { echo "typecheck failed"; exit 1; }
          ok "${{ needs.test.result }}" || { echo "test failed"; exit 1; }
          ok "${{ needs.vital-flows-e2e.result }}" || { echo "vital-flows-e2e failed"; exit 1; }
          ok "${{ needs.user-journeys-e2e.result }}" || { echo "user-journeys-e2e failed"; exit 1; }
          ok "${{ needs.agpl-check.result }}" || { echo "agpl-check failed"; exit 1; }
          echo "All checks passed ✓"

  release:
    name: Release images & changelog
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [all-checks]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: write
    concurrency:
      group: release-main
      cancel-in-progress: false
    env:
      REGISTRY: registry.tahti.live

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release version
        id: version
        run: |
          chmod +x scripts/next-release-tag.sh scripts/release-meta.sh scripts/release-changelog.sh
          bash scripts/release-meta.sh github

      - name: Find previous release tag
        id: prev
        run: |
          PREV="$(git tag -l '????-??-??-*' --sort=-v:refname | head -1 || true)"
          echo "tag=${PREV}" >> "$GITHUB_OUTPUT"
          echo "Previous tag: ${PREV:-<none>}"

      - name: Generate changelog
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          scripts/release-changelog.sh \
            "${{ steps.version.outputs.tag }}" \
            "${{ github.sha }}" \
            "${{ steps.prev.outputs.tag }}" > release-notes.md

      - name: Check registry credentials
        id: registry
        env:
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          if [[ -n "${REGISTRY_PASSWORD}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::REGISTRY_PASSWORD not set — skipping Docker push (GitHub release still created)"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to registry
        if: steps.registry.outputs.enabled == 'true'
        env:
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          REGISTRY_USER: ${{ secrets.REGISTRY_USER || 'tahti' }}
        run: |
          echo "$REGISTRY_PASSWORD" | \
            docker login "${{ env.REGISTRY }}" -u "$REGISTRY_USER" --password-stdin

      - name: Set up Docker Buildx
        if: steps.registry.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push website
        if: steps.registry.outputs.enabled == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: website/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/tahti/website:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/tahti/website:${{ github.sha }}
            ${{ env.REGISTRY }}/tahti/website:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/tahti/website:latest
          cache-to: type=inline

      - name: Build and push api
        if: steps.registry.outputs.enabled == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/tahti/api:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/tahti/api:${{ github.sha }}
            ${{ env.REGISTRY }}/tahti/api:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/tahti/api:latest
          cache-to: type=inline

      - name: Build and push web
        if: steps.registry.outputs.enabled == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/tahti/web:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/tahti/web:${{ github.sha }}
            ${{ env.REGISTRY }}/tahti/web:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/tahti/web:latest
          cache-to: type=inline

      - name: Build and push worker
        if: steps.registry.outputs.enabled == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/tahti/worker:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/tahti/worker:${{ github.sha }}
            ${{ env.REGISTRY }}/tahti/worker:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/tahti/worker:latest
          cache-to: type=inline

      - name: Build and push orchestrator
        if: steps.registry.outputs.enabled == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/orchestrator/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/tahti/orchestrator:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/tahti/orchestrator:${{ github.sha }}
            ${{ env.REGISTRY }}/tahti/orchestrator:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/tahti/orchestrator:latest
          cache-to: type=inline

      - name: Download OpenAPI spec
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: openapi-${{ github.sha }}
          path: release-assets

      - name: Compose release notes
        id: release_body
        env:
          REGISTRY_ENABLED: ${{ steps.registry.outputs.enabled }}
        run: |
          {
            echo 'body<<RELEASE_BODY'
            echo "**Release ${{ steps.version.outputs.name }}** (\`${{ steps.version.outputs.tag }}\`)"
            echo ""
            echo "Commit: \`${{ github.sha }}\`"
            if [[ "$REGISTRY_ENABLED" == "true" ]]; then
              echo ""
              echo "### Docker images"
              echo ""
              echo "Tagged \`${{ steps.version.outputs.tag }}\`, \`${{ github.sha }}\`, and \`latest\`:"
              echo ""
              echo '```'
              for svc in website api web worker orchestrator; do
                echo "${{ env.REGISTRY }}/tahti/${svc}:${{ steps.version.outputs.tag }}"
              done
              echo '```'
            fi
            echo ""
            echo "### Changelog"
            echo ""
            cat release-notes.md
            echo 'RELEASE_BODY'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          target_commitish: ${{ github.sha }}
          body: ${{ steps.release_body.outputs.body }}
          files: |
            release-assets/openapi.json
          fail_on_unmatched_files: false
