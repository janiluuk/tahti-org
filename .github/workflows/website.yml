# CI/CD — marketing website (tahti.live)
#
# Triggered on any push to main that touches website/ or infra/Caddyfile.
# Builds the nginx image, pushes to the self-hosted registry, and triggers
# a rolling update on the production Swarm via SSH.
#
# Required repository secrets:
#   REGISTRY_PASSWORD   — password for registry.tahti.live
#   DEPLOY_SSH_KEY      — private key for the deploy user on the production node
#   DEPLOY_HOST         — production node IP or hostname

name: website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "infra/Caddyfile"
      - "infra/docker-stack-phase1.yml"
      - ".github/workflows/website.yml"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: false

env:
  REGISTRY: registry.tahti.live
  IMAGE: tahti/website
  NGINX_BASE_IMAGE: mirror.gcr.io/library/nginx:1.27-alpine

jobs:
  preflight:
    name: Check registry credentials
    runs-on: ubuntu-24.04
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          if [[ -n "${REGISTRY_PASSWORD}" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::REGISTRY_PASSWORD not set — skipping website deploy"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    name: Build, push, deploy
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Log in to registry
        env:
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          echo "$REGISTRY_PASSWORD" | \
            docker login ${{ env.REGISTRY }} -u tahti --password-stdin

      - name: Build image
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Build attempt ${attempt}/3"
            if docker build \
              --build-arg "NGINX_IMAGE=${NGINX_BASE_IMAGE}" \
              --label "org.opencontainers.image.revision=${{ github.sha }}" \
              --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.tag.outputs.tag }} \
              -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest \
              website/; then
              exit 0
            fi
            sleep 20
          done
          exit 1

      - name: Push image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest

      - name: Smoke test image
        run: |
          docker run --rm -d --name smoke-test -p 18080:80 \
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
          sleep 3
          curl -sf http://localhost:18080/health | grep -q "ok"
          docker rm -f smoke-test
          echo "✓ Image smoke test passed"

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /srv/tahti
            echo "Deploying website ${{ steps.tag.outputs.tag }}..."
            TAG=${{ steps.tag.outputs.tag }} docker service update \
              --image ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.tag.outputs.tag }} \
              --with-registry-auth \
              tahti_website
            echo "✓ Website deployed"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            sleep 10
            curl -sf https://tahti.live/health | grep -q "ok" || (echo "Health check failed"; exit 1)
            echo "✓ Production health check passed"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Website deployment failed for ${{ github.sha }}"
          echo "Check the deploy logs and run: make logs SVC=website"
