name: tahti

services:
  website:
    build:
      context: ./website
      dockerfile: Dockerfile
    image: tahti/website:latest
    container_name: tahti-website
    restart: unless-stopped
    ports:
      - "8090:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - internal

networks:
  internal:
    name: tahti_net
    driver: bridge
