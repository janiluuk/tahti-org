# Phase 1 stack — website + Caddy TLS only.
# No stateful services. No API. No app.
# Used for the initial deployment to get tahti.fi live before Phase 3 stateful services.
#
# Deploy:
#   TAG=<sha> docker stack deploy -c infra/docker-stack-phase1.yml tahti
#
# Upgrade to full stack (Phase 3+):
#   TAG=<sha> docker stack deploy -c infra/docker-stack.yml tahti
#   (the --prune flag removes the phase1-only services)

version: "3.9"

networks:
  edge:
    driver: overlay
    attachable: true

volumes:
  caddy_data:
  caddy_config:

configs:
  caddyfile_phase1:
    file: ./Caddyfile.phase1

services:

  website:
    image: registry.tahti.fi/tahti/website:${TAG:-latest}
    networks: [edge]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      placement:
        constraints: [node.role == manager]
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  caddy:
    image: caddy:2-alpine
    networks: [edge]
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
      - target: 2019
        published: 2019
        mode: host
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    configs:
      - source: caddyfile_phase1
        target: /etc/caddy/Caddyfile
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
      placement:
        constraints: [node.role == manager]
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
