worker_processes auto;
events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        max_connections 200;

        application live {
            live on;
            record off;

            # API callbacks — validate stream key and trigger archive job
            on_publish http://api:3000/internal/rtmp/on_publish;
            on_done    http://api:3000/internal/rtmp/on_done;
            on_update  http://api:3000/internal/rtmp/on_update;
            notify_update_timeout 30s;

            # HLS output (Liquidsoap orchestrator re-mounts this volume)
            hls on;
            hls_path /srv/hls/live;
            hls_fragment 3s;
            hls_playlist_length 60s;
            hls_continuous on;
            hls_cleanup on;

            # Deny direct playback over RTMP
            deny play all;
        }
    }
}

http {
    server {
        listen 8080;
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }
        location /health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
