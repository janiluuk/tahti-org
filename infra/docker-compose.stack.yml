# Full local Tahti stack — infra + API + web + worker + orchestrator.
# Not Swarm; use: ./scripts/stack-up.sh
#
# App UI:     http://localhost:17777  (override WEB_PORT)
# API:        http://localhost:15011  (override API_PORT)
# MailHog:    http://localhost:18025
# MinIO:      http://localhost:19001  (tahti / tahti_dev_secret)

name: tahti-stack

x-app-env: &app-env
  NODE_ENV: production
  # PLAT-003: transaction pool via PgBouncer (migrations use direct postgres in db-push)
  DATABASE_URL: postgresql://tahti:tahti_dev@pgbouncer:5432/tahti?pgbouncer=true
  REDIS_URL: redis://redis:6379
  SESSION_SECRET: dev-session-secret-do-not-use-in-prod
  INTERNAL_SECRET: local-stack-internal-secret
  DOCS_PASS: local-stack-docs-pass
  HCAPTCHA_SECRET: local-stack-hcaptcha-secret
  SMTP_HOST: ${SMTP_HOST:-mailhog}
  SMTP_PORT: ${SMTP_PORT:-1025}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  SMTP_FROM: ${SMTP_FROM:-Tahti <noreply@tahti.live>}
  SUPPORT_INBOX: ${SUPPORT_INBOX:-support@tahti.live}
  MINIO_ENDPOINT: http://minio:9000
  MINIO_PUBLIC_ENDPOINT: http://localhost:19000
  MINIO_ACCESS_KEY: tahti
  MINIO_SECRET_KEY: tahti_dev_secret
  MINIO_BUCKET: tahti
  CENTRIFUGO_API_URL: http://chat:8000/api
  CENTRIFUGO_API_KEY: dev
  CENTRIFUGO_JWT_SECRET: dev_secret_do_not_use_in_prod
  ORCHESTRATOR_URL: http://orchestrator:3003
  ICECAST_HOST: icecast:8000
  ICECAST_BASE_URL: http://icecast:8000
  ICECAST_PUBLIC_URL: ${ICECAST_PUBLIC_URL:-http://localhost:${ICECAST_PORT:-18100}}
  ICECAST_INGEST_HOSTS: ${ICECAST_INGEST_HOSTS:-}
  RTMP_INGEST_HOST: rtmp-ingest
  RTMP_INGEST_HEALTH_PORT: "8080"
  # STREAM-003: comma-separated public RTMP ingest hosts for OBS failover (second replica in prod)
  RTMP_INGEST_HOSTS: ""
  # STREAM-007: comma-separated public Icecast hosts for Mixxx failover (second replica in prod)
  ICECAST_INGEST_HEALTH_PATH: /status-json.xsl
  # STREAM-008 phase 3: optional AcoustID key for archive tracklist title lookup (https://acoustid.org/new-application)
  ACOUSTID_API_KEY: ""
  ACRCLOUD_ENABLED: "false"
  # Post-production: ACRCLOUD_ENABLED=true + keys; set orchestrator FINGERPRINT_SEND_AUDIO=1
  ACRCLOUD_HOST: identify-eu-west-1.acrcloud.com
  ACRCLOUD_ACCESS_KEY: ""
  ACRCLOUD_ACCESS_SECRET: ""
  HLS_BASE_URL: http://localhost:19000/hls-live
  HLS_SEGMENT_ROOT: /hls
  HLS_MINIO_BUCKET: hls-live
  HLS_MINIO_PREFIX: hls-live
  HLS_STALE_SECONDS: "20"
  ARCHIVE_CACHE_ROOT: /archive-cache
  APP_URL: ${APP_URL:-http://localhost:${WEB_PORT:-17777}}
  API_URL: ${API_URL:-http://localhost:${API_PORT:-15011}}
  # PLAT-056: Revelator DSP distribution — obtain key at https://revelator.com; leave blank in dev
  REVELATOR_API_KEY: ${REVELATOR_API_KEY:-}
  # PLAT-057: Mixcloud archive upload OAuth — obtain prod credentials at https://www.mixcloud.com/developers/
  MIXCLOUD_CLIENT_ID: ${MIXCLOUD_CLIENT_ID:-}
  MIXCLOUD_CLIENT_SECRET: ${MIXCLOUD_CLIENT_SECRET:-}
  # PLAT-061: MaxMind GeoLite2 license key — for future geoip DB update automation (optional in dev)
  MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY:-}
  # Lab stack: higher auth rate limit so e2e journey suites can log in repeatedly
  RATE_LIMIT_AUTH_MAX: ${RATE_LIMIT_AUTH_MAX:-60}
  # M16: 24/7 placeholder stream on /radio — video (YouTube/Vimeo) or audio (HLS)
  TAHTI_RADIO_STREAM_MODE: ${TAHTI_RADIO_STREAM_MODE:-video}
  TAHTI_RADIO_VIDEO_URL: ${TAHTI_RADIO_VIDEO_URL:-${TAHTI_RADIO_YOUTUBE_URL:-}}
  TAHTI_RADIO_AUDIO_URL: ${TAHTI_RADIO_AUDIO_URL:-${TAHTI_RADIO_HLS_URL:-}}

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tahti
      POSTGRES_PASSWORD: tahti_dev
      POSTGRES_DB: tahti
    # No host port — isolated stack DB; seed via `docker compose exec` on the api service.
    volumes:
      - stack_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tahti -d tahti"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  pgbouncer:
    image: edoburu/pgbouncer:1.22.1-p0
    environment:
      DATABASE_URL: postgres://tahti:tahti_dev@postgres:5432/tahti
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "25"
    ports:
      - "${PGBOUNCER_PORT:-16432}:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "127.0.0.1", "-p", "5432"]
      interval: 5s
      timeout: 3s
      retries: 8
      start_period: 5s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--loglevel", "warning"]
    volumes:
      - stack_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tahti
      MINIO_ROOT_PASSWORD: tahti_dev_secret
    ports:
      - "${MINIO_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - stack_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 tahti tahti_dev_secret &&
        mc mb --ignore-existing local/tahti &&
        mc mb --ignore-existing local/audio &&
        mc mb --ignore-existing local/covers &&
        mc mb --ignore-existing local/hls-live &&
        mc mb --ignore-existing local/recordings &&
        mc anonymous set download local/covers &&
        mc anonymous set download local/hls-live &&
        echo 'MinIO buckets ready'
      "
    restart: "no"

  chat:
    image: centrifugo/centrifugo:v5
    command: centrifugo --config /centrifugo/config.json --port=8000 --health
    volumes:
      - ./stack/centrifugo.dev.json:/centrifugo/config.json:ro
    ports:
      - "${CHAT_PORT:-18000}:8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "${MAILHOG_SMTP_PORT:-15025}:1025"
      - "${MAILHOG_UI_PORT:-18025}:8025"

  icecast:
    image: moul/icecast:latest
    user: "101:102"
    entrypoint: ["/usr/bin/icecast2"]
    command: ["-n", "-c", "/etc/icecast2/icecast.xml"]
    volumes:
      - ./stack/icecast.xml:/etc/icecast2/icecast.xml:ro
    ports:
      - "${ICECAST_PORT:-18100}:8000"

  # STREAM-007: optional second Icecast for local failover testing (`docker compose --profile icecast-failover up`)
  icecast-b:
    profiles: ["icecast-failover"]
    image: moul/icecast:latest
    user: "101:102"
    entrypoint: ["/usr/bin/icecast2"]
    command: ["-n", "-c", "/etc/icecast2/icecast.xml"]
    volumes:
      - ./stack/icecast.xml:/etc/icecast2/icecast.xml:ro
    ports:
      - "${ICECAST_B_PORT:-18101}:8000"

  rtmp-ingest:
    image: tiangolo/nginx-rtmp:latest
    volumes:
      - ./stack/nginx-rtmp.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${RTMP_PORT:-1935}:1935"

  # STREAM-003: optional second RTMP ingest for local failover testing
  rtmp-ingest-b:
    profiles: ["rtmp-failover"]
    image: tiangolo/nginx-rtmp:latest
    volumes:
      - ./stack/nginx-rtmp.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${RTMP_B_PORT:-1936}:1935"
      - "${RTMP_B_HEALTH_PORT:-8086}:8080"

  db-push:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      <<: *app-env
      # Migrations bypass PgBouncer (transaction pooling breaks Prisma migrate)
      DATABASE_URL: postgresql://tahti:tahti_dev@postgres:5432/tahti
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "pnpm --filter @tahti/db exec prisma db push --accept-data-loss"]
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      <<: *app-env
      PORT: "3001"
    ports:
      - "${API_PORT:-15011}:3001"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailhog:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    environment:
      <<: *app-env
      API_URL: http://api:3001
      PORT: "3000"
    ports:
      - "${WEB_PORT:-17777}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 45s

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    environment:
      <<: *app-env
      RECORDINGS_ROOT: /recordings
    volumes:
      - stack_hls:/hls:ro
      - stack_recordings:/recordings:ro
      - stack_archive_cache:/archive-cache
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  orchestrator:
    build:
      context: ..
      dockerfile: services/orchestrator/Dockerfile
    environment:
      <<: *app-env
      PORT: "3003"
      FFMPEG_IMAGE: jrotting/ffmpeg:6-alpine
      ICECAST_BASE_URL: http://icecast:8000
      RTMP_INGEST_URL: rtmp://rtmp-ingest:1935
      HLS_VOLUME: tahti_stack_hls
      RECORDINGS_VOLUME: tahti_stack_recordings
      ARCHIVE_CACHE_VOLUME: tahti_stack_archive_cache
      FINGERPRINT_SEND_AUDIO: "0"
    ports:
      - "${ORCHESTRATOR_PORT:-15003}:3003"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - stack_hls:/hls
      - stack_recordings:/recordings
      - stack_archive_cache:/archive-cache
    depends_on:
      api:
        condition: service_healthy

  website:
    build:
      context: ../website
      dockerfile: Dockerfile
    ports:
      - "${WEBSITE_PORT:-18080}:80"
    volumes:
      - ../website/output_vhs.mp4:/usr/share/nginx/html/output_vhs.mp4:ro,optional
      - ../website/bg-audio.mp3:/usr/share/nginx/html/bg-audio.mp3:ro
    profiles: ["marketing"]

volumes:
  stack_postgres:
  stack_redis:
  stack_minio:
  stack_hls:
    name: tahti_stack_hls
  stack_recordings:
    name: tahti_stack_recordings
  stack_archive_cache:
    name: tahti_stack_archive_cache
