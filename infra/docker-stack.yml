version: "3.9"

# App DB connections use PgBouncer (PLAT-003). Migrations use direct postgres:5432 — see db-migrate-deploy.sh.
x-db-pool-env: &db-pool-env
  DATABASE_URL: postgres://tahti@pgbouncer:5432/tahti?pgbouncer=true

# ─────────────────────────────────────────────────────────────────────────────
# Tahti — production Swarm stack
#
# One-time setup on the manager node:
#   docker swarm init --advertise-addr <manager-ip>
#   docker node update --label-add role=db       <node-db-01>
#   docker node update --label-add role=storage  <node-storage-01>
#   docker node update --label-add role=worker   <node-worker-01>
#   docker node update --label-add role=worker   <node-worker-02>
#   docker node update --label-add role=edge     <node-edge-01>
#   docker node update --label-add ingest_id=a  <node-ingest-01>
#   docker node update --label-add ingest_id=b  <node-ingest-02>
#
# Create secrets (run once, values never leave the manager):
#   echo -n "..." | docker secret create pg_password -
#   echo -n "..." | docker secret create minio_root_password -
#   openssl rand -base64 48 | docker secret create session_secret -
#   openssl rand -base64 32 | docker secret create rtmp_key_encryption_key -
#   openssl rand -base64 32 | docker secret create centrifugo_secret -
#   openssl rand -hex 32   | docker secret create chat_fingerprint_salt -
#   echo -n "..." | docker secret create revelator_api_key -
#   echo -n "..." | docker secret create mixcloud_client_secret -
#   echo -n "tahti" | docker secret create docs_user -
#   openssl rand -base64 24 | docker secret create docs_pass -
#   echo -n "..." | docker secret create smtp_password -
#   echo -n "..." | docker secret create acoustid_api_key -
# Post-production ACRCloud (off until ACRCLOUD_ENABLED=true on api):
#   echo -n "$KEY" | docker secret create acrcloud_access_key -
#   echo -n "$SECRET" | docker secret create acrcloud_access_secret -
#
# Deploy:
#   make deploy TAG=<git-sha>
#   — or —
#   TAG=<git-sha> docker stack deploy -c infra/docker-stack.yml tahti
# ─────────────────────────────────────────────────────────────────────────────

networks:
  edge:
    driver: overlay
    attachable: true
  internal:
    driver: overlay
    attachable: true
  ingest:
    driver: overlay
    attachable: true

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
  caddy_logs:
  hls_shared:
  recordings_shared:
  archive_cache_shared:
  prometheus_data:
  grafana_data:

secrets:
  pg_password:               { external: true }
  minio_root_password:       { external: true }
  session_secret:            { external: true }
  rtmp_key_encryption_key:   { external: true }
  centrifugo_secret:         { external: true }
  chat_fingerprint_salt:     { external: true }
  revelator_api_key:         { external: true }
  mixcloud_client_secret:    { external: true }
  google_drive_client_secret: { external: true }
  twitter_client_secret:     { external: true }
  instagram_client_secret:   { external: true }
  smtp_password:             { external: true }
  docs_user:                 { external: true }
  docs_pass:                 { external: true }
  acoustid_api_key:          { external: true }

configs:
  caddyfile:    { file: ./Caddyfile }
  centrifugo:   { file: ./centrifugo.json }
  nginx_rtmp:   { file: ./nginx-rtmp.conf }
  icecast:      { file: ./icecast.xml }
  icecast_b:    { file: ./icecast-b.xml }
  prometheus:   { file: ./prometheus.yml }

services:

  # ───────────────────────────────────────────────────────────────────────────
  # Website — static marketing site (tahti.live / www.tahti.live)
  # ───────────────────────────────────────────────────────────────────────────
  website:
    image: registry.tahti.live/tahti/website:${TAG:-latest}
    networks: [edge]
    volumes:
      - type: bind
        source: /srv/tahti/media/output_vhs.mp4
        target: /usr/share/nginx/html/output_vhs.mp4
        read_only: true
      - type: bind
        source: /srv/tahti/media/bg-audio.mp3
        target: /usr/share/nginx/html/bg-audio.mp3
        read_only: true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      replicas: 2
      placement:
        constraints: [node.labels.role == worker]
      update_config: { parallelism: 1, order: start-first }
      restart_policy: { condition: any, delay: 5s }
      resources:
        limits: { cpus: "0.5", memory: 256M }

  # ───────────────────────────────────────────────────────────────────────────
  # Postgres
  # ───────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    networks: [internal]
    environment:
      POSTGRES_USER: tahti
      POSTGRES_DB: tahti
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    secrets: [pg_password]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tahti"]
      interval: 10s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.role == db]
      restart_policy: { condition: any, delay: 5s, max_attempts: 5 }
      resources:
        limits: { cpus: "2", memory: 4G }

  # ───────────────────────────────────────────────────────────────────────────
  # PgBouncer — transaction pool before scaling api / worker replicas (PLAT-003)
  # ───────────────────────────────────────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:1.22.1-p0
    networks: [internal]
    environment:
      DB_HOST: postgres
      DB_USER: tahti
      DB_NAME: tahti
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "500"
      DEFAULT_POOL_SIZE: "30"
    secrets: [pg_password]
    command:
      - /bin/sh
      - -ec
      - |
        export DB_PASSWORD="$$(cat /run/secrets/pg_password)"
        exec /entrypoint.sh
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "127.0.0.1", "-p", "5432"]
      interval: 10s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.role == db]
      restart_policy: { condition: any, delay: 5s }
      resources:
        limits: { cpus: "0.5", memory: 256M }

  # ───────────────────────────────────────────────────────────────────────────
  # Redis — API sessions, BullMQ queues, Centrifugo backplane, presence
  # ───────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "2gb", "--maxmemory-policy", "allkeys-lru"]
    networks: [internal]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.role == db]
      resources:
        limits: { cpus: "1", memory: 2.5G }

  # ───────────────────────────────────────────────────────────────────────────
  # MinIO — object storage for archive audio, covers, waveforms
  # ───────────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    networks: [internal, edge]
    environment:
      MINIO_ROOT_USER: tahti
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    secrets: [minio_root_password]
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.role == storage]
      resources:
        limits: { cpus: "2", memory: 2G }

  # ───────────────────────────────────────────────────────────────────────────
  # Centrifugo — live chat WebSocket server
  # ───────────────────────────────────────────────────────────────────────────
  chat:
    image: centrifugo/centrifugo:v5
    command: centrifugo --config /etc/centrifugo/config.json
    networks: [internal, edge]
    environment:
      CENTRIFUGO_TOKEN_HMAC_SECRET_KEY_FILE: /run/secrets/centrifugo_secret
    secrets: [centrifugo_secret]
    configs:
      - source: centrifugo
        target: /etc/centrifugo/config.json
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 15s
      retries: 5
    deploy:
      replicas: 2
      placement:
        constraints: [node.labels.role == worker]
      update_config: { parallelism: 1, order: start-first }
      resources:
        limits: { cpus: "1", memory: 1G }

  # ───────────────────────────────────────────────────────────────────────────
  # API — Fastify backend
  # ───────────────────────────────────────────────────────────────────────────
  api:
    image: registry.tahti.live/tahti/api:${TAG:-latest}
    networks: [internal, edge]
    environment:
      <<: *db-pool-env
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: https://cdn.tahti.live
      MINIO_ACCESS_KEY: tahti
      MINIO_SECRET_KEY_FILE: /run/secrets/minio_root_password
      CENTRIFUGO_HOST: chat
      PUBLIC_CDN_BASE: https://cdn.tahti.live
      PUBLIC_HLS_BASE: https://stream.tahti.live
      APP_URL: https://app.tahti.live
      API_URL: https://api.tahti.live
      ICECAST_HOST: icecast:8000
      ICECAST_PUBLIC_URL: https://ingest-icecast.tahti.live
      ICECAST_INGEST_HOSTS: https://ingest-icecast.tahti.live,https://ingest-icecast-b.tahti.live
      ICECAST_INGEST_HEALTH_PATH: /status-json.xsl
      RTMP_INGEST_HOST: ingest.tahti.live
      RTMP_INGEST_HOSTS: ingest.tahti.live,ingest-b.tahti.live
      RTMP_INGEST_HEALTH_PORT: "8080"
      RTMP_INGEST_HEALTH_PATH: /health
      ACRCLOUD_ENABLED: "false"
      ACOUSTID_API_KEY_FILE: /run/secrets/acoustid_api_key
      SESSION_SECRET_FILE: /run/secrets/session_secret
      RTMP_KEY_FILE: /run/secrets/rtmp_key_encryption_key
      CENTRIFUGO_SECRET_FILE: /run/secrets/centrifugo_secret
      CHAT_FINGERPRINT_SALT_FILE: /run/secrets/chat_fingerprint_salt
      REVELATOR_API_KEY_FILE: /run/secrets/revelator_api_key
      MIXCLOUD_CLIENT_SECRET_FILE: /run/secrets/mixcloud_client_secret
      TWITTER_CLIENT_SECRET_FILE: /run/secrets/twitter_client_secret
      INSTAGRAM_CLIENT_SECRET_FILE: /run/secrets/instagram_client_secret
      SMTP_PASSWORD_FILE: /run/secrets/smtp_password
      DOCS_USER_FILE: /run/secrets/docs_user
      DOCS_PASS_FILE: /run/secrets/docs_pass
      MIXCLOUD_CLIENT_ID: ${MIXCLOUD_CLIENT_ID:-}
      MIXCLOUD_OAUTH_REDIRECT_URI: ${MIXCLOUD_OAUTH_REDIRECT_URI:-}
      GOOGLE_DRIVE_CLIENT_SECRET_FILE: /run/secrets/google_drive_client_secret
      GOOGLE_DRIVE_CLIENT_ID: ${GOOGLE_DRIVE_CLIENT_ID:-}
      GOOGLE_DRIVE_DEVELOPER_KEY: ${GOOGLE_DRIVE_DEVELOPER_KEY:-}
      GOOGLE_DRIVE_OAUTH_REDIRECT_URI: ${GOOGLE_DRIVE_OAUTH_REDIRECT_URI:-}
      TWITTER_CLIENT_ID: ${TWITTER_CLIENT_ID:-}
      TWITTER_OAUTH_REDIRECT_URI: ${TWITTER_OAUTH_REDIRECT_URI:-}
      INSTAGRAM_CLIENT_ID: ${INSTAGRAM_CLIENT_ID:-}
      INSTAGRAM_OAUTH_REDIRECT_URI: ${INSTAGRAM_OAUTH_REDIRECT_URI:-}
      EMAIL_BOUNCE_WEBHOOK_SECRET: ${EMAIL_BOUNCE_WEBHOOK_SECRET:-}
    secrets:
      - pg_password
      - session_secret
      - rtmp_key_encryption_key
      - centrifugo_secret
      - chat_fingerprint_salt
      - revelator_api_key
      - mixcloud_client_secret
      - google_drive_client_secret
      - twitter_client_secret
      - instagram_client_secret
      - smtp_password
      - docs_user
      - docs_pass
      - acoustid_api_key
      - minio_root_password
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      retries: 5
    deploy:
      replicas: 3
      placement:
        constraints: [node.labels.role == worker]
      update_config: { parallelism: 1, delay: 10s, order: start-first, failure_action: rollback }
      restart_policy: { condition: any, delay: 5s }
      resources:
        limits: { cpus: "1", memory: 1G }

  # ───────────────────────────────────────────────────────────────────────────
  # Workers — media transcoding, distribution, light fanout
  # ───────────────────────────────────────────────────────────────────────────
  worker-media:
    image: registry.tahti.live/tahti/worker:${TAG:-latest}
    command: ["node", "dist/index.js", "--queues=transcode-archive,record-live,fingerprint,cloud-import-google-drive"]
    networks: [internal]
    environment:
      <<: *db-pool-env
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: tahti
      MINIO_SECRET_KEY_FILE: /run/secrets/minio_root_password
      HLS_SEGMENT_ROOT: /hls
      HLS_MINIO_BUCKET: hls-live
      HLS_STALE_SECONDS: "20"
      ARCHIVE_CACHE_ROOT: /archive-cache
      ACOUSTID_API_KEY_FILE: /run/secrets/acoustid_api_key
      RTMP_KEY_FILE: /run/secrets/rtmp_key_encryption_key
      GOOGLE_DRIVE_CLIENT_SECRET_FILE: /run/secrets/google_drive_client_secret
      GOOGLE_DRIVE_CLIENT_ID: ${GOOGLE_DRIVE_CLIENT_ID:-}
    secrets: [pg_password, acoustid_api_key, rtmp_key_encryption_key, google_drive_client_secret, minio_root_password]
    volumes:
      - recordings_shared:/recordings:ro
      - hls_shared:/hls:ro
      - archive_cache_shared:/archive-cache
    deploy:
      replicas: 2
      placement:
        constraints: [node.labels.role == worker]
      resources:
        limits: { cpus: "4", memory: 4G }

  worker-dist:
    image: registry.tahti.live/tahti/worker:${TAG:-latest}
    command: ["node", "dist/index.js", "--queues=mixcloud-upload,revelator-deliver,revelator-royalty-sync"]
    networks: [internal]
    environment:
      <<: *db-pool-env
      REDIS_URL: redis://redis:6379
      REVELATOR_API_KEY_FILE: /run/secrets/revelator_api_key
      MIXCLOUD_CLIENT_SECRET_FILE: /run/secrets/mixcloud_client_secret
      MIXCLOUD_CLIENT_ID: ${MIXCLOUD_CLIENT_ID:-}
    secrets: [pg_password, revelator_api_key, mixcloud_client_secret]
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.role == worker]
      resources:
        limits: { cpus: "1", memory: 1G }

  worker-light:
    image: registry.tahti.live/tahti/worker:${TAG:-latest}
    command: ["node", "dist/index.js", "--queues=stats-rollup,chat-cleanup,chat-ban-rotate"]
    networks: [internal]
    environment:
      <<: *db-pool-env
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: tahti
      MINIO_SECRET_KEY_FILE: /run/secrets/minio_root_password
      ARCHIVE_CACHE_ROOT: /archive-cache
    secrets: [pg_password, minio_root_password]
    volumes:
      - archive_cache_shared:/archive-cache
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.role == worker]
      resources:
        limits: { cpus: "1", memory: 512M }

  worker-edge-log:
    image: registry.tahti.live/tahti/worker:${TAG:-latest}
    command: ["node", "dist/index.js", "--queues=edge-log"]
    networks: [internal]
    environment:
      <<: *db-pool-env
      REDIS_URL: redis://redis:6379
      CADDY_HLS_ACCESS_LOG: /var/log/caddy/hls-access.log
    secrets: [pg_password]
    volumes:
      - caddy_logs:/var/log/caddy:ro
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.role == edge]
      resources:
        limits: { cpus: "0.25", memory: 256M }

  # ───────────────────────────────────────────────────────────────────────────
  # Orchestrator — spawns per-channel Liquidsoap containers
  # ───────────────────────────────────────────────────────────────────────────
  orchestrator:
    image: registry.tahti.live/tahti/orchestrator:${TAG:-latest}
    networks: [internal]
    environment:
      <<: *db-pool-env
      REDIS_URL: redis://redis:6379
      DOCKER_HOST: unix:///var/run/docker.sock
      CHANNEL_IMAGE: registry.tahti.live/tahti/liquidsoap:latest
      FFMPEG_IMAGE: jrotting/ffmpeg:6-alpine
      CHANNEL_NETWORK: tahti_internal
      ICECAST_BASE_URL: http://icecast:8000
      RTMP_INGEST_URL: rtmp://rtmp-ingest:1935
      API_URL: http://api:3000
      FINGERPRINT_SEND_AUDIO: "0"
      HLS_VOLUME: hls_shared
      RECORDINGS_VOLUME: recordings_shared
      ARCHIVE_CACHE_VOLUME: archive_cache_shared
    secrets: [pg_password]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]

  # ───────────────────────────────────────────────────────────────────────────
  # Icecast — live ingress for Mixxx / Traktor / butt / SAM Cast (Icecast protocol)
  # ───────────────────────────────────────────────────────────────────────────
  icecast:
    image: moul/icecast:latest
    networks: [ingest, internal]
    configs:
      - source: icecast
        target: /etc/icecast.xml
    volumes:
      - recordings_shared:/recordings
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.ingest_id == a]
      resources:
        limits: { cpus: "2", memory: 1G }

  # STREAM-007: second Icecast ingest replica (Mixxx/Traktor failover)
  icecast-b:
    image: moul/icecast:latest
    networks: [ingest, internal]
    configs:
      - source: icecast_b
        target: /etc/icecast.xml
    volumes:
      - recordings_shared:/recordings
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.ingest_id == b]
      resources:
        limits: { cpus: "2", memory: 1G }

  # ───────────────────────────────────────────────────────────────────────────
  # nginx-RTMP — live ingress for OBS / Streamlabs (RTMP protocol)
  # ───────────────────────────────────────────────────────────────────────────
  rtmp-ingest:
    image: tiangolo/nginx-rtmp:latest
    networks: [ingest, internal]
    ports:
      - target: 1935
        published: 1935
        mode: host
    configs:
      - source: nginx_rtmp
        target: /etc/nginx/nginx.conf
    volumes:
      - hls_shared:/srv/hls
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.ingest_id == a]
      resources:
        limits: { cpus: "2", memory: 1G }

  # STREAM-003: second RTMP ingest replica (OBS failover — DNS A record to ingest-b node)
  rtmp-ingest-b:
    image: tiangolo/nginx-rtmp:latest
    networks: [ingest, internal]
    ports:
      - target: 1935
        published: 1935
        mode: host
    configs:
      - source: nginx_rtmp
        target: /etc/nginx/nginx.conf
    volumes:
      - hls_shared:/srv/hls
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.ingest_id == b]
      resources:
        limits: { cpus: "2", memory: 1G }

  # ───────────────────────────────────────────────────────────────────────────
  # Web — Next.js artist app (app.tahti.live + per-channel subdomains)
  # ───────────────────────────────────────────────────────────────────────────
  web:
    image: registry.tahti.live/tahti/web:${TAG:-latest}
    networks: [internal, edge]
    # NOTE: NEXT_PUBLIC_* vars are inlined into the JS bundle at *build* time —
    # setting them here has no effect at runtime. The real values are baked in
    # by the `build-args` in .github/workflows/deploy.yml's web build step.
    environment:
      INTERNAL_API_BASE: http://api:3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      retries: 5
    deploy:
      replicas: 2
      placement:
        constraints: [node.labels.role == worker]
      update_config: { parallelism: 1, order: start-first }
      resources:
        limits: { cpus: "1", memory: 1G }

  # ───────────────────────────────────────────────────────────────────────────
  # Caddy — TLS termination + reverse proxy
  # ───────────────────────────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    networks: [edge]
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
      - target: 2019
        published: 2019
        mode: host
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.role == edge]
      resources:
        limits: { cpus: "1", memory: 512M }

  # ───────────────────────────────────────────────────────────────────────────
  # Observability
  # ───────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    networks: [internal]
    volumes:
      - prometheus_data:/prometheus
    configs:
      - source: prometheus
        target: /etc/prometheus/prometheus.yml
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.role == db]
      resources:
        limits: { cpus: "1", memory: 1G }

  grafana:
    image: grafana/grafana:latest
    networks: [internal, edge]
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/session_secret
      GF_SERVER_ROOT_URL: https://grafana.tahti.live
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    secrets: [session_secret]
    volumes:
      - grafana_data:/var/lib/grafana
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.role == db]
      resources:
        limits: { cpus: "1", memory: 512M }
