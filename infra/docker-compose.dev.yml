version: "3.9"

# Local dev — stateful infra only.
# Run API / web / workers with `pnpm dev` on the host (port 3000+).
#
# Quick start:
#   make dev
#   open http://localhost:8080   ← marketing website
#   open http://localhost:8025   ← MailHog (email UI)
#   open http://localhost:9001   ← MinIO console (tahti / tahti_dev_secret)
#   open http://localhost:8000   ← Centrifugo admin (password: dev)
#   open http://localhost:8100   ← Icecast status
#
# First time only:
#   make dev && make dev-init-buckets

services:

  # ── Marketing website ──────────────────────────────────────────────────────
  website:
    build:
      context: ../website
      dockerfile: Dockerfile
    ports:
      - "${WEBSITE_PORT:-8080}:80"
    volumes:
      - ../website/output_vhs.mp4:/usr/share/nginx/html/output_vhs.mp4:ro,optional
      - ../website/bg-audio.mp3:/usr/share/nginx/html/bg-audio.mp3:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── Postgres ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tahti
      POSTGRES_PASSWORD: tahti_dev
      POSTGRES_DB: tahti
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - dev_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tahti -d tahti"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--loglevel", "warning"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - dev_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── MinIO — S3-compatible object storage ──────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tahti
      MINIO_ROOT_PASSWORD: tahti_dev_secret
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - dev_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── MinIO bucket initializer — runs once, creates dev buckets + policies ──
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 tahti tahti_dev_secret &&
        mc mb --ignore-existing local/tahti &&
        mc mb --ignore-existing local/audio &&
        mc mb --ignore-existing local/covers &&
        mc mb --ignore-existing local/hls-live &&
        mc mb --ignore-existing local/recordings &&
        mc mb --ignore-existing local/backups &&
        mc anonymous set download local/covers &&
        mc anonymous set download local/hls-live &&
        mc anonymous set download local/tahti/avatars &&
        mc anonymous set download local/tahti/press-kit &&
        mc anonymous set download local/tahti/posts &&
        echo 'MinIO buckets ready'
      "
    restart: "no"

  # ── Centrifugo — WebSocket hub for live chat ──────────────────────────────
  chat:
    image: centrifugo/centrifugo:v5
    command: >
      centrifugo
      --port=8000
      --admin
      --admin_password=dev
      --admin_secret=dev
      --api_key=dev
      --token_hmac_secret_key=dev_secret_do_not_use_in_prod
      --allowed_origins=http://localhost:3000,http://localhost:3001
      --presence=true
      --history_size=100
      --history_ttl=86400s
    ports:
      - "${CHAT_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Icecast — source ingress for Mixxx / Traktor / butt ───────────────────
  icecast:
    image: moul/icecast:latest
    environment:
      ICECAST_SOURCE_PASSWORD: dev_source
      ICECAST_ADMIN_PASSWORD: dev_admin
      ICECAST_ADMIN_USERNAME: admin
      ICECAST_PASSWORD: dev_listener
    ports:
      - "${ICECAST_PORT:-8100}:8000"

  # ── nginx-RTMP — ingress for OBS / Streamlabs ─────────────────────────────
  rtmp-ingest:
    image: tiangolo/nginx-rtmp:latest
    ports:
      - "${RTMP_PORT:-1935}:1935"

  # ── MailHog — catches all outgoing email in dev ───────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"   # SMTP
      - "${MAILHOG_UI_PORT:-8025}:8025"     # Web UI

  # ── Prometheus — metrics collection ───────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - dev_prometheus:/prometheus

volumes:
  dev_postgres:
  dev_redis:
  dev_minio:
  dev_prometheus:
