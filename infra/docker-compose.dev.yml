version: "3.9"

# Local dev — stateful infra only. Run apps with `pnpm dev` on the host.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: replay
      POSTGRES_PASSWORD: replay_dev
      POSTGRES_DB: replay
    ports: ["5432:5432"]
    volumes:
      - dev_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes:
      - dev_redis:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: replay
      MINIO_ROOT_PASSWORD: replay_dev_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - dev_minio:/data

  chat:
    image: centrifugo/centrifugo:v5
    command: centrifugo --port=8000 --admin --admin_password=dev --admin_secret=dev --api_key=dev --token_hmac_secret_key=dev_secret_change_me
    ports:
      - "8000:8000"

  icecast:
    image: moul/icecast:latest
    environment:
      ICECAST_SOURCE_PASSWORD: dev_source
      ICECAST_ADMIN_PASSWORD: dev_admin
      ICECAST_ADMIN_USERNAME: admin
      ICECAST_PASSWORD: dev_listener
    ports: ["8100:8000"]

  rtmp-ingest:
    image: tiangolo/nginx-rtmp:latest
    ports: ["1935:1935"]

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  dev_postgres:
  dev_redis:
  dev_minio:
