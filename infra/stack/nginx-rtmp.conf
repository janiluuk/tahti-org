worker_processes auto;
events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        max_connections 200;

        application live {
            live on;
            record off;

            on_publish http://api:3001/internal/rtmp/on_publish;
            on_done    http://api:3001/internal/rtmp/on_done;
            on_update  http://api:3001/internal/rtmp/on_update;
            notify_update_timeout 30s;

            # No on-disk HLS output here — the orchestrator spins up a per-channel ffmpeg
            # "edge encoder" that pulls this RTMP feed directly (rtmp://rtmp-ingest:1935/live/<slug>)
            # and re-encodes for Liquidsoap. nginx's own hls_path was unused dead config that
            # crashed the container on every start (mkdir() on an unmounted /srv/hls).

            deny play all;
        }
    }
}

http {
    server {
        listen 8080;
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }
        location /health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
